name: verify-matrix

# infra-006: 全量 verify 矩阵 CI。
# infra-011: wire paths-filter（dorny/paths-filter@v3）→ PR 上仅跑 affected area，
#            非 PR（push main / feat/** / workflow_dispatch）仍跑全量。
#            smoke 永远跑。详见 .github/paths-filter.yml。
#
# - smoke 跑 ./init.sh（COCO_CI=1，跳过真硬件子检查）
# - per-area verify jobs 跑 run_verify_all.py --area X --skip-list
#   * 不再用 --filter NNN 硬编码白名单（rework L0-1）
#   * 每个 job area 名与 V9 期望表一一对应
#   * SKIP_LIST 在 scripts/run_verify_all.py 集中维护（CI 跑不动的脚本，
#     原因仅限：真硬件 / 真 daemon / 远超 60s budget），并通过 --skip-list 启用
# - verify-robot 不再 continue-on-error: true（rework L0-2）；
#   在 job 内 inline 起 mockup-sim daemon，让 sim-first robot 用例可在 CI 通
# - artifact 上传 evidence/** 与失败 verify 的输出
# - 用 astral-sh/setup-uv@v3 自带 uv 缓存（rework L1-3 + L1-4）
# - on.push.branches 含 feat/** 让 feature 分支也触发（rework L2-7）

on:
  push:
    branches:
      - main
      - 'feat/**'
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: verify-matrix-${{ github.ref }}
  cancel-in-progress: true

env:
  COCO_CI: "1"

jobs:
  # infra-015: lint pre-job。把 phase-12 落地的 lint_paths_filter.py /
  # lint_workflows.py（actionlint dry-run hook）真接入 CI。
  # - actionlint binary 通过 rhysd 官方 download-actionlint.bash 安装
  #   （v1.7.12 pin tag），PATH 注入走 $GITHUB_PATH 而非 /usr/local/bin/
  # - lint_paths_filter.py 校验 .github/paths-filter.yml schema / 兜底
  # - lint_workflows.py --strict 对所有 .github/workflows/*.yml 跑 actionlint
  # 后续 verify-* matrix job 走 needs: [smoke, changes, lint]，lint 红即整个
  # matrix fail-fast，避免 workflow 自身坏掉时再消耗 CI 跑业务 verify。
  # round 2 fix: 不再用 rhysd/actionlint@v1（该仓库无 action.yml），改走
  # 官方 download-actionlint.bash + GITHUB_PATH 注入（C1/C3 修复）。
  lint:
    name: lint workflows + paths-filter (infra-015)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install actionlint (pinned 1.7.12 via rhysd download script)
        id: actionlint
        run: |
          set -euo pipefail
          # rhysd/actionlint 官方推荐安装方式；脚本会下到当前目录
          bash <(curl -sSL https://raw.githubusercontent.com/rhysd/actionlint/v1.7.12/scripts/download-actionlint.bash) 1.7.12
          pwd >> "$GITHUB_PATH"
      - name: Show actionlint version
        run: actionlint -version
      - name: Lint paths-filter (infra-011/013/015)
        run: python scripts/lint_paths_filter.py
      - name: Lint workflows (actionlint --strict, infra-015)
        run: python scripts/lint_workflows.py --strict

  # infra-011: paths-filter gate。
  # 在 PR 上检测 area diff，输出 7 个 boolean；非 PR event 下游 job 用
  # github.event_name != 'pull_request' 强制全量。
  # infra-013 fu-2: 新增 meta 兜底 output。pyproject / tests / conftest /
  # .github / verify runner 等跨 area 改动触发全 7 个 verify-XXX job，
  # 避免 paths-filter 误判 cross-area regression。
  changes:
    name: paths-filter (infra-011)
    runs-on: ubuntu-latest
    needs: lint
    outputs:
      vision: ${{ steps.filter.outputs.vision }}
      interact: ${{ steps.filter.outputs.interact }}
      companion: ${{ steps.filter.outputs.companion }}
      audio: ${{ steps.filter.outputs.audio }}
      robot: ${{ steps.filter.outputs.robot }}
      infra: ${{ steps.filter.outputs.infra }}
      publish: ${{ steps.filter.outputs.publish }}
      meta: ${{ steps.filter.outputs.meta }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: .github/paths-filter.yml

  smoke:
    name: smoke (init.sh)
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install uv (with cache)
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
      - name: uv sync
        run: uv sync
      - name: Run smoke (COCO_CI=1)
        run: COCO_CI=1 ./init.sh
      - name: Upload smoke artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-py${{ matrix.python-version }}
          path: |
            evidence/**
            /tmp/coco-daemon.log
          if-no-files-found: ignore
      # infra-018: 上传 history jsonl + verify_summary.json 用于跨日趋势分析。
      # 独立 artifact 名带 run_id 便于回溯。retention 14d 控制存储费。
      - name: Upload history + summary artifacts (infra-018)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: history-summary-${{ github.run_id }}-py${{ matrix.python-version }}
          path: |
            evidence/_history/**
            evidence/**/verify_summary.json
          if-no-files-found: ignore
          retention-days: 14

  verify-vision:
    name: verify vision
    runs-on: ubuntu-latest
    needs: [smoke, changes]
    if: github.event_name != 'pull_request' || needs.changes.outputs.vision == 'true' || needs.changes.outputs.meta == 'true'
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
      - run: uv sync
      - name: Run vision verify (full area, skip-list applied)
        run: uv run python scripts/run_verify_all.py --area vision --skip-list
      - name: Upload vision artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: verify-vision-py${{ matrix.python-version }}
          path: evidence/**
          if-no-files-found: ignore

  verify-interact:
    name: verify interact
    runs-on: ubuntu-latest
    needs: [smoke, changes]
    if: github.event_name != 'pull_request' || needs.changes.outputs.interact == 'true' || needs.changes.outputs.meta == 'true'
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
      - run: uv sync
      - name: Run interact verify (full area, skip-list applied)
        run: uv run python scripts/run_verify_all.py --area interact --skip-list
      - name: Upload interact artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: verify-interact-py${{ matrix.python-version }}
          path: evidence/**
          if-no-files-found: ignore

  verify-companion:
    name: verify companion
    runs-on: ubuntu-latest
    needs: [smoke, changes]
    if: github.event_name != 'pull_request' || needs.changes.outputs.companion == 'true' || needs.changes.outputs.meta == 'true'
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
      - run: uv sync
      - name: Run companion verify (full area, skip-list applied)
        run: uv run python scripts/run_verify_all.py --area companion --skip-list
      - name: Upload companion artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: verify-companion-py${{ matrix.python-version }}
          path: evidence/**
          if-no-files-found: ignore

  verify-audio:
    name: verify audio
    runs-on: ubuntu-latest
    needs: [smoke, changes]
    if: github.event_name != 'pull_request' || needs.changes.outputs.audio == 'true' || needs.changes.outputs.meta == 'true'
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
      - run: uv sync
      - name: Pull TTS models (best-effort)
        run: bash scripts/fetch_tts_models.sh || true
      - name: Run audio verify (full area, skip-list applied)
        run: uv run python scripts/run_verify_all.py --area audio --skip-list
      - name: Upload audio artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: verify-audio-py${{ matrix.python-version }}
          path: evidence/**
          if-no-files-found: ignore

  verify-robot:
    name: verify robot
    runs-on: ubuntu-latest
    needs: [smoke, changes]
    if: github.event_name != 'pull_request' || needs.changes.outputs.robot == 'true' || needs.changes.outputs.meta == 'true'
    # rework L0-2：去掉 continue-on-error。SKIP_LIST 里的 robot verify
    # （verify_robot001_daemon / verify_robot002_actions /
    # verify_companion001_* / verify_interact001 / verify_audio003_app_integration）
    # 都需 mockup-sim daemon 物理通路 + 完整 zenoh 7447 心跳，CI 起不动；
    # 由 uat-phase4 真机 UAT 跟踪。剩下 verify_robot_003 / verify_robot_004
    # 纯逻辑 sim，必须 PASS。
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
      - run: uv sync
      - name: Run robot verify (full area, skip-list applied)
        run: uv run python scripts/run_verify_all.py --area robot --skip-list
      - name: Upload robot artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: verify-robot-py${{ matrix.python-version }}
          path: evidence/**
          if-no-files-found: ignore

  verify-infra:
    name: verify infra
    runs-on: ubuntu-latest
    needs: [smoke, changes]
    if: github.event_name != 'pull_request' || needs.changes.outputs.infra == 'true' || needs.changes.outputs.meta == 'true'
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
      - run: uv sync
      - name: Run infra verify (full area, skip-list applied)
        run: uv run python scripts/run_verify_all.py --area infra --skip-list
      - name: Upload infra artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: verify-infra-py${{ matrix.python-version }}
          path: evidence/**
          if-no-files-found: ignore

  verify-publish:
    name: verify publish
    runs-on: ubuntu-latest
    needs: [smoke, changes]
    if: github.event_name != 'pull_request' || needs.changes.outputs.publish == 'true' || needs.changes.outputs.meta == 'true'
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
      - run: uv sync
      - name: Run publish verify (full area, skip-list applied)
        # 注：verify_publish.py 自身在 SKIP_LIST 内（远超 CI budget），本 job
        # 当前为空跑，留 placeholder：未来加 publish-relate 的纯静态 verify
        # 到本 area（如 entry_points 解析、pyproject schema 检查）。job 名
        # 由 V9 强制存在，确保 area 不再静默。
        run: uv run python scripts/run_verify_all.py --area publish --skip-list
      - name: Upload publish artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: verify-publish-py${{ matrix.python-version }}
          path: evidence/**
          if-no-files-found: ignore
