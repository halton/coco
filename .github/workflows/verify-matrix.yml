name: verify-matrix

# infra-006: 全量 verify 矩阵 CI。
#
# - smoke 跑 ./init.sh（COCO_CI=1，跳过真硬件子检查）
# - per-area verify jobs 跑各自 scripts/verify_*.py 子集
# - 任何一个 verify 失败即 job 红灯
# - artifact 上传 evidence/** 与失败 verify 的输出

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: verify-matrix-${{ github.ref }}
  cancel-in-progress: true

env:
  COCO_CI: "1"

jobs:
  smoke:
    name: smoke (init.sh)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-py${{ matrix.python-version }}-${{ hashFiles('pyproject.toml') }}
      - name: Install uv
        run: pipx install uv || pip install --user uv
      - name: uv sync
        run: uv sync
      - name: Run smoke (COCO_CI=1)
        run: COCO_CI=1 ./init.sh
      - name: Upload smoke artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-py${{ matrix.python-version }}
          path: |
            evidence/**
            /tmp/coco-daemon.log
          if-no-files-found: ignore

  verify-vision:
    name: verify vision
    runs-on: ubuntu-latest
    needs: smoke
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-py${{ matrix.python-version }}-${{ hashFiles('pyproject.toml') }}
      - name: Install uv
        run: pipx install uv || pip install --user uv
      - name: uv sync
        run: uv sync
      - name: Run vision verify subset
        run: |
          uv run python scripts/run_verify_all.py --area vision --filter 002 || exit 1
          uv run python scripts/run_verify_all.py --area vision --filter 004 || exit 1
          uv run python scripts/run_verify_all.py --area vision --filter 005 || exit 1
          uv run python scripts/run_verify_all.py --area vision --filter 006 || exit 1
      - name: Upload vision artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: verify-vision-py${{ matrix.python-version }}
          path: evidence/**
          if-no-files-found: ignore

  verify-interact:
    name: verify interact
    runs-on: ubuntu-latest
    needs: smoke
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-py${{ matrix.python-version }}-${{ hashFiles('pyproject.toml') }}
      - name: Install uv
        run: pipx install uv || pip install --user uv
      - name: uv sync
        run: uv sync
      - name: Run interact verify subset (002/007/009/010/011)
        run: |
          for id in 002 007 009 010 011; do
            uv run python scripts/run_verify_all.py --area interact --filter "$id" || exit 1
          done
      - name: Upload interact artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: verify-interact-py${{ matrix.python-version }}
          path: evidence/**
          if-no-files-found: ignore

  verify-companion:
    name: verify companion
    runs-on: ubuntu-latest
    needs: smoke
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-py${{ matrix.python-version }}-${{ hashFiles('pyproject.toml') }}
      - name: Install uv
        run: pipx install uv || pip install --user uv
      - name: uv sync
        run: uv sync
      - name: Run companion verify subset (005/006/007/008)
        run: |
          for id in 005 006 007 008; do
            uv run python scripts/run_verify_all.py --area companion --filter "_$id" || exit 1
          done
      - name: Upload companion artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: verify-companion-py${{ matrix.python-version }}
          path: evidence/**
          if-no-files-found: ignore

  verify-robot:
    name: verify robot
    runs-on: ubuntu-latest
    needs: smoke
    # 注：verify_robot_004 可能需要 mockup-sim daemon（8000/7447）。
    # CI 上若 daemon 起不来，该 job 会失败；本期先纳入矩阵，后续若稳定性差
    # 可拆为 optional job 或单独 marker 跳过。详见 infra-006 notes。
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-py${{ matrix.python-version }}-${{ hashFiles('pyproject.toml') }}
      - name: Install uv
        run: pipx install uv || pip install --user uv
      - name: uv sync
        run: uv sync
      - name: Run robot verify subset (004)
        run: |
          uv run python scripts/run_verify_all.py --area robot --filter "_004" || exit 1
      - name: Upload robot artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: verify-robot-py${{ matrix.python-version }}
          path: evidence/**
          if-no-files-found: ignore

  verify-infra:
    name: verify infra
    runs-on: ubuntu-latest
    needs: smoke
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-py${{ matrix.python-version }}-${{ hashFiles('pyproject.toml') }}
      - name: Install uv
        run: pipx install uv || pip install --user uv
      - name: uv sync
        run: uv sync
      - name: Run infra verify subset (005)
        run: |
          uv run python scripts/run_verify_all.py --area infra --filter "_005" || exit 1
      - name: Upload infra artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: verify-infra-py${{ matrix.python-version }}
          path: evidence/**
          if-no-files-found: ignore
